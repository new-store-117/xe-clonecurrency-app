<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Clinic Center - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <div class="clinic-icon"><i class="fas fa-heartbeat"></i></div>
            <div class="clinic-name">
                <h1>HEALTH CLINIC CENTER</h1>
                <p>Your Health, Our Priority</p>
            </div>
        </div>
        <div class="header-badge"><i class="fas fa-check-circle"></i> Digital Check-in System</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-menu">
                <a href="index.html" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="checkin.html" class="nav-item"><i class="fas fa-edit"></i> Check-in</a>
                <a href="patients.html" class="nav-item"><i class="fas fa-users"></i> Patients</a>
                <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> Settings</a>
                <a href="#" class="nav-item logout-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
            <div class="offline-footer"><i class="fas fa-wifi-slash"></i> Offline Mode</div>
        </div>

        <div class="content-area" id="mainContent"></div>
    </div>

    <div class="footer"><p>© 2025 Health Clinic Center – Your Health, Our Priority</p></div>
</div>

<div id="toastContainer"></div>

<script>
    let patients = [
        { id: "P1001", name: "Claudine Mukamana", age: 34, gender: "Female", visitType: "Follow-up", symptoms: "Cough, fever", status: "Waiting" },
        { id: "P1002", name: "Emmanuel Ndayisaba", age: 58, gender: "Male", visitType: "New Patient", symptoms: "High blood pressure", status: "Waiting" },
        { id: "P1003", name: "Jean Uwimana", age: 42, gender: "Male", visitType: "New Patient", symptoms: "Headache, fatigue", status: "In consultation" },
        { id: "P1004", name: "Marie Uwase", age: 27, gender: "Female", visitType: "Follow-up", symptoms: "Prenatal check", status: "Waiting" },
        { id: "P1005", name: "John Mugisha", age: 65, gender: "Male", visitType: "New Patient", symptoms: "Chest pain", status: "Waiting" }
    ];

    function renderDashboard() {
        const waitingCount = patients.filter(p => p.status === "Waiting").length;
        const newPatients = patients.filter(p => p.visitType === "New Patient").length;
        const followUps = patients.filter(p => p.visitType === "Follow-up").length;
        const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        return `
            <div class="page-header">
                <h2><i class="fas fa-stethoscope"></i> Dashboard</h2>
                <p>Welcome back, Dr. Uwimana</p>
            </div>
            <div class="stats-row">
                <div class="stat-card"><div class="stat-emoji">⏳</div><div class="stat-number">${waitingCount}</div><div class="stat-label">Waiting Now</div></div>
                <div class="stat-card"><div class="stat-emoji">✅</div><div class="stat-number">${patients.length}</div><div class="stat-label">Check-ins Today</div></div>
                <div class="stat-card"><div class="stat-emoji">🆕</div><div class="stat-number">${newPatients}</div><div class="stat-label">New Patients</div></div>
                <div class="stat-card"><div class="stat-emoji">🔄</div><div class="stat-number">${followUps}</div><div class="stat-label">Follow-ups</div></div>
                <div class="stat-card"><div class="stat-emoji">🕒</div><div class="stat-number">${currentTime}</div><div class="stat-label">Current Time</div></div>
            </div>
            <div class="queue-section">
                <div class="section-header"><strong><i class="fas fa-list-ol"></i> Live Patient Queue</strong></div>
                <table class="patients-table">
                    <thead><tr><th>#</th><th>Patient Name</th><th>Age</th><th>Visit Type</th><th>Status</th></tr></thead>
                    <tbody>
                        ${patients.map((p, i) => `
                        <tr>
                            <td>${i+1}</td>
                            <td><strong>${p.name}</strong><br><small>${p.id}</small></td>
                            <td>${p.age}</td>
                            <td>${p.visitType}</td>
                            <td><span class="status-badge ${p.status === 'Waiting' ? 'status-waiting' : 'status-consult'}">${p.status}</span></td>
                        </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="info-card"><i class="fas fa-info-circle"></i> <strong>3‑Clicks Rule:</strong> Register patient → Click Check-in → Fill details → Submit</div>
        `;
    }

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function logout() { 
        showToast("Logged out successfully"); 
        setTimeout(() => window.location.href = 'index.html', 1000); 
    }

    document.getElementById('mainContent').innerHTML = renderDashboard();
</script>
</body>
</html>
