<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Clinic Center | Check-in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo-area"><div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
        <div class="logo-text"><h1>HEALTH CLINIC CENTER</h1><p>Your Health, Our Priority</p></div></div>
        <div class="badge"><span><i class="fas fa-check-circle"></i> Digital Check-in System</span></div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="checkin.html" class="nav-item active"><i class="fas fa-edit"></i> Check-in</a>
                <a href="patients.html" class="nav-item"><i class="fas fa-users"></i> Patients</a>
                <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> Settings</a>
            </nav>
            <div class="offline-indicator"><span><i class="fas fa-wifi-slash"></i> Offline Mode</span></div>
        </aside>

        <main class="content">
            <div class="page-header"><h2><i class="fas fa-clinic-medical"></i> Patient Check-in</h2><p>Quick registration — complete in 3 clicks</p></div>
            
            <div class="form-card">
                <div class="form-grid">
                    <div><label><strong>Full Name *</strong></label><input type="text" id="fullName" placeholder="e.g., Jean Uwimana"></div>
                    <div><label><strong>Age *</strong></label><input type="number" id="age" placeholder="Years"></div>
                    <div>
                        <label><strong>Gender</strong></label>
                        <div><label><input type="radio" name="gender" value="Male"> Male</label><label><input type="radio" name="gender" value="Female"> Female</label></div>
                    </div>
                    <div><label><strong>Visit Type</strong></label><select id="visitType"><option value="New Patient">New Patient</option><option value="Follow-up">Follow-up</option></select></div>
                    <div><label><strong>Symptoms</strong></label><textarea id="symptoms" rows="2" placeholder="e.g., fever, headache"></textarea></div>
                </div>
                <div class="form-actions"><button class="btn-secondary" onclick="clearForm()">🗑️ Clear Form</button><button class="btn-primary" onclick="submitCheckin()">✅ Submit Check-in</button></div>
            </div>
        </main>
    </div>

    <footer class="footer"><p>© 2025 Health Clinic Center – Your Health, Our Priority</p></footer>
</div>
<div id="toastContainer"></div>
<script src="script.js"></script>
<script>
    function submitCheckin() {
        const name = document.getElementById('fullName').value.trim();
        const age = document.getElementById('age').value;
        const genderElem = document.querySelector('input[name="gender"]:checked');
        const gender = genderElem ? genderElem.value : "Not specified";
        const visitType = document.getElementById('visitType').value;
        const symptoms = document.getElementById('symptoms').value.trim() || "Not provided";
        
        if (!name || !age) { alert("Please provide name and age"); return; }
        
        const patients = JSON.parse(localStorage.getItem('patients')) || [];
        const nextId = patients.length + 1001;
        const newPatient = { id: "P" + nextId, name, age: parseInt(age), gender, visitType, symptoms, status: "Waiting" };
        patients.unshift(newPatient);
        localStorage.setItem('patients', JSON.stringify(patients));
        alert(`${name} checked-in successfully! ID: ${newPatient.id}`);
        window.location.href = 'index.html';
    }
    function clearForm() { document.getElementById('fullName').value = ''; document.getElementById('age').value = ''; document.getElementById('symptoms').value = ''; }
</script>
</body>
</html>
