<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Clinic Center | Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo-area"><div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
        <div class="logo-text"><h1>HEALTH CLINIC CENTER</h1><p>Your Health, Our Priority</p></div></div>
        <div class="badge"><span><i class="fas fa-check-circle"></i> Digital Check-in System</span></div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="checkin.html" class="nav-item"><i class="fas fa-edit"></i> Check-in</a>
                <a href="patients.html" class="nav-item"><i class="fas fa-users"></i> Patients</a>
                <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="settings.html" class="nav-item active"><i class="fas fa-sliders-h"></i> Settings</a>
            </nav>
            <div class="offline-indicator"><span><i class="fas fa-wifi-slash"></i> Offline Mode</span></div>
        </aside>

        <main class="content">
            <div class="page-header"><h2><i class="fas fa-sliders-h"></i> System Settings</h2><p>Configure clinic preferences</p></div>
            <div class="card"><h3><i class="fas fa-globe"></i> General Preferences</h3><div><label>Language</label><select><option>English</option><option>Kinyarwanda</option></select></div></div>
            <div class="card"><h3><i class="fas fa-database"></i> Data Management</h3><button class="btn-primary" onclick="exportData()">📥 Export Data (CSV)</button><button class="btn-danger" onclick="clearAll()" style="margin-left:10px;">⚠️ Clear All Data</button></div>
        </main>
    </div>

    <footer class="footer"><p>© 2025 Health Clinic Center – Your Health, Our Priority</p></footer>
</div>
<script src="script.js"></script>
<script>
    function exportData() { let patients = JSON.parse(localStorage.getItem('patients')) || []; let csv = "ID,Name,Age,Gender,Visit Type,Symptoms,Status\n"; patients.forEach(p=>{ csv+=`${p.id},${p.name},${p.age},${p.gender},${p.visitType},${p.symptoms},${p.status}\n`; }); let link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv])); link.download = 'patients.csv'; link.click(); }
    function clearAll() { if(confirm('Delete ALL patient data?')){ localStorage.removeItem('patients'); alert('Data cleared'); } }
</script>
</body>
</html>
