<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Clinic Center | Reports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo-area"><div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
        <div class="logo-text"><h1>HEALTH CLINIC CENTER</h1><p>Your Health, Our Priority</p></div></div>
        <div class="badge"><span><i class="fas fa-check-circle"></i> Digital Check-in System</span></div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="checkin.html" class="nav-item"><i class="fas fa-edit"></i> Check-in</a>
                <a href="patients.html" class="nav-item"><i class="fas fa-users"></i> Patients</a>
                <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="reports.html" class="nav-item active"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> Settings</a>
            </nav>
            <div class="offline-indicator"><span><i class="fas fa-wifi-slash"></i> Offline Mode</span></div>
        </aside>

        <main class="content">
            <div class="page-header"><h2><i class="fas fa-chart-pie"></i> Reports & Analytics</h2><p>Clinic performance insights</p></div>
            <div class="stats-grid" id="reportStats"></div>
            <div class="card"><h3>Gender Distribution</h3><p id="genderDist"></p></div>
        </main>
    </div>

    <footer class="footer"><p>© 2025 Health Clinic Center – Your Health, Our Priority</p></footer>
</div>
<script src="script.js"></script>
<script>
    const patients = JSON.parse(localStorage.getItem('patients')) || [];
    const newCount = patients.filter(p => p.visitType === "New Patient").length;
    const followCount = patients.filter(p => p.visitType === "Follow-up").length;
    const maleCount = patients.filter(p => p.gender === "Male").length;
    const femaleCount = patients.filter(p => p.gender === "Female").length;
    document.getElementById('reportStats').innerHTML = `<div class="stat-card"><div>📊</div><div class="stat-number">${patients.length}</div><div>Total</div></div><div class="stat-card"><div>🆕</div><div class="stat-number">${newCount}</div><div>New</div></div><div class="stat-card"><div>🔄</div><div class="stat-number">${followCount}</div><div>Follow-ups</div></div>`;
    document.getElementById('genderDist').innerHTML = `👨 Male: ${maleCount} | 👩 Female: ${femaleCount}`;
</script>
</body>
</html>
